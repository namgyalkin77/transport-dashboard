<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoST Dashboard - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        .tab-btn.active {
            border-bottom-color: #2563EB;
            color: #2563EB;
        }
        .form-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #D1D5DB;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn-primary {
            background-color: #2563EB;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #1D4ED8;
        }
        .btn-secondary {
            background-color: #6B7280;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #4B5563;
        }
        .btn-danger {
            background-color: #DC2626;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .btn-danger:hover {
            background-color: #B91C1C;
        }
        .btn-edit {
            background-color: #059669;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .btn-edit:hover {
            background-color: #047857;
        }
        .alert {
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }
        .alert-success {
            background-color: #DEF7EC;
            color: #03543F;
            border: 1px solid #84E1BC;
        }
        .alert-error {
            background-color: #FDE8E8;
            color: #9B1C1C;
            border: 1px solid #F98080;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <div class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">🔧 DoST Admin Panel</h1>
                        <p class="text-sm text-gray-600">Manage Projects & Activities</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="index.html" class="text-blue-600 hover:text-blue-800 font-medium">
                            📊 View Dashboard
                        </a>
                        <button onclick="exportData()" class="btn-secondary">
                            💾 Export Data
                        </button>
                        <button onclick="importData()" class="btn-secondary">
                            📤 Import Data
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6 py-8">
            <!-- Alert Messages -->
            <div id="alertContainer"></div>

            <!-- Tabs -->
            <div class="bg-white rounded-lg shadow-sm mb-6">
                <div class="border-b flex space-x-8 px-6">
                    <button class="tab-btn active" onclick="switchTab('add')" data-tab="add">
                        ➕ Add New Project
                    </button>
                    <button class="tab-btn" onclick="switchTab('update')" data-tab="update">
                        ✏️ Update Projects
                    </button>
                    <button class="tab-btn" onclick="switchTab('manage')" data-tab="manage">
                        📋 Manage All Projects
                    </button>
                </div>

                <!-- Add New Project Tab -->
                <div id="addTab" class="p-6">
                    <h2 class="text-xl font-semibold text-gray-900 mb-6">Add New Project Activity</h2>
                    <form id="addProjectForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Regional Office *</label>
                                <select id="add_office" class="form-input" required>
                                    <option value="">Select Office</option>
                                    <option value="Lingmithang">Lingmithang</option>
                                    <option value="Lobeysa">Lobeysa</option>
                                    <option value="Phuentsholing">Phuentsholing</option>
                                    <option value="Samdrup Jongkhar">Samdrup Jongkhar</option>
                                    <option value="Sarpang">Sarpang</option>
                                    <option value="Thimphu">Thimphu</option>
                                    <option value="Tingtibi">Tingtibi</option>
                                    <option value="Trashigang">Trashigang</option>
                                    <option value="Trongsa">Trongsa</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Project Name *</label>
                                <input type="text" id="add_project" class="form-input" placeholder="e.g., Highway Expansion Project" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Activity Description *</label>
                                <input type="text" id="add_activity" class="form-input" placeholder="e.g., Road Widening Phase 1" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Progress (%) *</label>
                                <input type="number" id="add_progress" class="form-input" min="0" max="100" placeholder="0-100" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Status *</label>
                                <select id="add_status" class="form-input" required>
                                    <option value="">Select Status</option>
                                    <option value="On Track">On Track</option>
                                    <option value="Delayed">Delayed</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Priority *</label>
                                <select id="add_priority" class="form-input" required>
                                    <option value="">Select Priority</option>
                                    <option value="Critical">Critical</option>
                                    <option value="High">High</option>
                                    <option value="Medium">Medium</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Total Budget (Nu.) *</label>
                                <input type="number" id="add_budget" class="form-input" placeholder="e.g., 120000000" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Amount Spent (Nu.) *</label>
                                <input type="number" id="add_spent" class="form-input" placeholder="e.g., 102000000" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Start Date *</label>
                                <input type="date" id="add_startDate" class="form-input" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">End Date *</label>
                                <input type="date" id="add_endDate" class="form-input" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Contractor *</label>
                                <input type="text" id="add_contractor" class="form-input" placeholder="e.g., Bhutan Construction Ltd" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Contact Focal Person *</label>
                                <input type="text" id="add_focal" class="form-input" placeholder="e.g., Tenzin Dorji" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                                <input type="tel" id="add_phone" class="form-input" placeholder="+975-2-123456" required>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                                <input type="email" id="add_email" class="form-input" placeholder="name@mowhs.gov.bt" required>
                            </div>
                        </div>

                        <div class="flex justify-end space-x-4 pt-4">
                            <button type="button" onclick="resetAddForm()" class="btn-secondary">
                                🔄 Reset Form
                            </button>
                            <button type="submit" class="btn-primary">
                                ✅ Add Project
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Update Projects Tab -->
                <div id="updateTab" class="p-6" style="display: none;">
                    <h2 class="text-xl font-semibold text-gray-900 mb-6">Update Project Progress</h2>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Select Project to Update</label>
                        <select id="updateProjectSelect" class="form-input" onchange="loadProjectForUpdate()">
                            <option value="">-- Select a project --</option>
                        </select>
                    </div>

                    <div id="updateFormContainer" style="display: none;">
                        <form id="updateProjectForm" class="space-y-6">
                            <input type="hidden" id="update_id">
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Regional Office</label>
                                    <input type="text" id="update_office" class="form-input bg-gray-100" readonly>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Project Name</label>
                                    <input type="text" id="update_project" class="form-input bg-gray-100" readonly>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Activity Description</label>
                                    <input type="text" id="update_activity" class="form-input bg-gray-100" readonly>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Progress (%) *</label>
                                    <input type="number" id="update_progress" class="form-input" min="0" max="100" required>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Status *</label>
                                    <select id="update_status" class="form-input" required>
                                        <option value="On Track">On Track</option>
                                        <option value="Delayed">Delayed</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Priority *</label>
                                    <select id="update_priority" class="form-input" required>
                                        <option value="Critical">Critical</option>
                                        <option value="High">High</option>
                                        <option value="Medium">Medium</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Total Budget (Nu.)</label>
                                    <input type="number" id="update_budget" class="form-input bg-gray-100" readonly>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Amount Spent (Nu.) *</label>
                                    <input type="number" id="update_spent" class="form-input" required>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Contractor</label>
                                    <input type="text" id="update_contractor" class="form-input bg-gray-100" readonly>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                                    <input type="date" id="update_endDate" class="form-input bg-gray-100" readonly>
                                </div>
                            </div>

                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <h3 class="font-semibold text-blue-900 mb-2">📊 Quick Stats</h3>
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <span class="text-gray-600">Budget Utilization:</span>
                                        <span class="font-bold text-blue-900 ml-2" id="budgetUtilPercent">0%</span>
                                    </div>
                                    <div>
                                        <span class="text-gray-600">Remaining Budget:</span>
                                        <span class="font-bold text-blue-900 ml-2" id="remainingBudget">Nu. 0</span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex justify-end space-x-4 pt-4">
                                <button type="button" onclick="cancelUpdate()" class="btn-secondary">
                                    ❌ Cancel
                                </button>
                                <button type="submit" class="btn-primary">
                                    💾 Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Manage All Projects Tab -->
                <div id="manageTab" class="p-6" style="display: none;">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-semibold text-gray-900">All Projects & Activities</h2>
                        <div class="flex items-center space-x-4">
                            <input type="text" id="searchManage" class="form-input" placeholder="🔍 Search..." style="width: 300px;">
                            <select id="filterOffice" class="form-input" onchange="filterManageTable()">
                                <option value="">All Offices</option>
                                <option value="Thimphu">Thimphu</option>
                                <option value="Phuentsholing">Phuentsholing</option>
                                <option value="Punakha">Punakha</option>
                                <option value="Bumthang">Bumthang</option>
                                <option value="Mongar">Mongar</option>
                                <option value="Trashigang">Trashigang</option>
                                <option value="Samtse">Samtse</option>
                                <option value="Trongsa">Trongsa</option>
                                <option value="Gasa">Gasa</option>
                            </select>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Office</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Project</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Activity</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Progress</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="manageTableBody" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-6 flex items-center justify-between">
                        <p class="text-sm text-gray-600">
                            Total Projects: <span class="font-bold" id="totalCount">0</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden File Input for Import -->
    <input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="handleFileImport(event)">

    <script>
        // Load data from localStorage or initialize with sample data
        function loadData() {
            const stored = localStorage.getItem('dostProjects');
            if (stored) {
                return JSON.parse(stored);
            }
            
            // Initial sample data
            return [
                { id: 1, office: 'Thimphu', project: 'Thimphu-Paro Highway Expansion', activity: 'Road Widening Phase 1', progress: 85, status: 'On Track', budget: 120000000, spent: 102000000, startDate: '2024-01-15', endDate: '2024-12-31', contractor: 'Bhutan Construction Ltd', priority: 'High', focal: 'Tenzin Dorji', phone: '+975-2-123456', email: 'tenzin.dorji@mowhs.gov.bt' },
                { id: 2, office: 'Thimphu', project: 'City Ring Road Development', activity: 'Traffic Signal Installation', progress: 45, status: 'Delayed', budget: 45000000, spent: 20250000, startDate: '2024-03-01', endDate: '2024-08-30', contractor: 'Tech Solutions Bhutan', priority: 'Medium', focal: 'Tenzin Dorji', phone: '+975-2-123456', email: 'tenzin.dorji@mowhs.gov.bt' },
                { id: 3, office: 'Phuentsholing', project: 'India Border Road Upgrade', activity: 'Surface Treatment', progress: 70, status: 'On Track', budget: 95000000, spent: 66500000, startDate: '2023-11-01', endDate: '2024-09-30', contractor: 'Border Infrastructure', priority: 'Critical', focal: 'Karma Wangchuk', phone: '+975-5-251234', email: 'karma.wangchuk@mowhs.gov.bt' }
            ];
        }

        function saveData(data) {
            localStorage.setItem('dostProjects', JSON.stringify(data));
            // Also save to a downloadable format
            updateMainDashboard(data);
        }

        function updateMainDashboard(data) {
            // This would update the main dashboard's data
            // For now, we'll create a JavaScript file that can be included
            const jsCode = `const projectData = ${JSON.stringify(data, null, 2)};`;
            console.log('Data updated. Copy this to update index.html:', jsCode);
        }

        let projectData = loadData();

        // Tab Switching
        function switchTab(tab) {
            // Hide all tabs
            document.getElementById('addTab').style.display = 'none';
            document.getElementById('updateTab').style.display = 'none';
            document.getElementById('manageTab').style.display = 'none';

            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tab + 'Tab').style.display = 'block';
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // Load data for specific tabs
            if (tab === 'update') {
                populateUpdateDropdown();
            } else if (tab === 'manage') {
                loadManageTable();
            }
        }

        // Alert Functions
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertContainer.appendChild(alertDiv);

            setTimeout(() => {
                alertDiv.remove();
            }, 5000);

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Add New Project
        document.getElementById('addProjectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newProject = {
                id: projectData.length > 0 ? Math.max(...projectData.map(p => p.id)) + 1 : 1,
                office: document.getElementById('add_office').value,
                project: document.getElementById('add_project').value,
                activity: document.getElementById('add_activity').value,
                progress: parseInt(document.getElementById('add_progress').value),
                status: document.getElementById('add_status').value,
                budget: parseInt(document.getElementById('add_budget').value),
                spent: parseInt(document.getElementById('add_spent').value),
                startDate: document.getElementById('add_startDate').value,
                endDate: document.getElementById('add_endDate').value,
                contractor: document.getElementById('add_contractor').value,
                priority: document.getElementById('add_priority').value,
                focal: document.getElementById('add_focal').value,
                phone: document.getElementById('add_phone').value,
                email: document.getElementById('add_email').value
            };

            projectData.push(newProject);
            saveData(projectData);
            
            showAlert('✅ Project added successfully!', 'success');
            resetAddForm();
        });

        function resetAddForm() {
            document.getElementById('addProjectForm').reset();
        }

        // Update Project Functions
        function populateUpdateDropdown() {
            const select = document.getElementById('updateProjectSelect');
            select.innerHTML = '<option value="">-- Select a project --</option>';
            
            projectData.forEach(project => {
                const option = document.createElement('option');
                option.value = project.id;
                option.textContent = `${project.office} - ${project.project} - ${project.activity}`;
                select.appendChild(option);
            });
        }

        function loadProjectForUpdate() {
            const projectId = parseInt(document.getElementById('updateProjectSelect').value);
            if (!projectId) {
                document.getElementById('updateFormContainer').style.display = 'none';
                return;
            }

            const project = projectData.find(p => p.id === projectId);
            if (!project) return;

            document.getElementById('updateFormContainer').style.display = 'block';
            
            document.getElementById('update_id').value = project.id;
            document.getElementById('update_office').value = project.office;
            document.getElementById('update_project').value = project.project;
            document.getElementById('update_activity').value = project.activity;
            document.getElementById('update_progress').value = project.progress;
            document.getElementById('update_status').value = project.status;
            document.getElementById('update_priority').value = project.priority;
            document.getElementById('update_budget').value = project.budget;
            document.getElementById('update_spent').value = project.spent;
            document.getElementById('update_contractor').value = project.contractor;
            document.getElementById('update_endDate').value = project.endDate;

            updateBudgetStats();
        }

        function updateBudgetStats() {
            const budget = parseInt(document.getElementById('update_budget').value) || 0;
            const spent = parseInt(document.getElementById('update_spent').value) || 0;
            
            const utilization = budget > 0 ? Math.round((spent / budget) * 100) : 0;
            const remaining = budget - spent;

            document.getElementById('budgetUtilPercent').textContent = utilization + '%';
            document.getElementById('remainingBudget').textContent = `Nu. ${(remaining / 1000000).toFixed(1)}M`;
        }

        document.getElementById('update_spent').addEventListener('input', updateBudgetStats);

        document.getElementById('updateProjectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const projectId = parseInt(document.getElementById('update_id').value);
            const index = projectData.findIndex(p => p.id === projectId);

            if (index !== -1) {
                projectData[index].progress = parseInt(document.getElementById('update_progress').value);
                projectData[index].status = document.getElementById('update_status').value;
                projectData[index].priority = document.getElementById('update_priority').value;
                projectData[index].spent = parseInt(document.getElementById('update_spent').value);

                saveData(projectData);
                showAlert('✅ Project updated successfully!', 'success');
                
                document.getElementById('updateFormContainer').style.display = 'none';
                document.getElementById('updateProjectSelect').value = '';
            }
        });

        function cancelUpdate() {
            document.getElementById('updateFormContainer').style.display = 'none';
            document.getElementById('updateProjectSelect').value = '';
        }

        // Manage Table Functions
        function loadManageTable() {
            const tbody = document.getElementById('manageTableBody');
            tbody.innerHTML = '';

            projectData.forEach(project => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-900">${project.id}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${project.office}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${project.project}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${project.activity}</td>
                    <td class="px-6 py-4 text-sm">
                        <div class="flex items-center">
                            <div class="w-20 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${project.progress}%"></div>
                            </div>
                            <span class="text-gray-900">${project.progress}%</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full ${project.status === 'On Track' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${project.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm space-x-2">
                        <button onclick="quickEdit(${project.id})" class="btn-edit">✏️ Edit</button>
                        <button onclick="deleteProject(${project.id})" class="btn-danger">🗑️ Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalCount').textContent = projectData.length;
        }

        // Search functionality
        document.getElementById('searchManage').addEventListener('input', function(e) {
            filterManageTable();
        });

        function filterManageTable() {
            const searchTerm = document.getElementById('searchManage').value.toLowerCase();
            const officeFilter = document.getElementById('filterOffice').value;
            
            const tbody = document.getElementById('manageTableBody');
            tbody.innerHTML = '';

            const filtered = projectData.filter(project => {
                const matchesSearch = searchTerm === '' || 
                    project.project.toLowerCase().includes(searchTerm) ||
                    project.activity.toLowerCase().includes(searchTerm) ||
                    project.office.toLowerCase().includes(searchTerm);
                
                const matchesOffice = officeFilter === '' || project.office === officeFilter;
                
                return matchesSearch && matchesOffice;
            });

            filtered.forEach(project => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-900">${project.id}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${project.office}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${project.project}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${project.activity}</td>
                    <td class="px-6 py-4 text-sm">
                        <div class="flex items-center">
                            <div class="w-20 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${project.progress}%"></div>
                            </div>
                            <span class="text-gray-900">${project.progress}%</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-semibold rounded-full ${project.status === 'On Track' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${project.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm space-x-2">
                        <button onclick="quickEdit(${project.id})" class="btn-edit">✏️ Edit</button>
                        <button onclick="deleteProject(${project.id})" class="btn-danger">🗑️ Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalCount').textContent = filtered.length;
        }

        function quickEdit(projectId) {
            switchTab('update');
            document.getElementById('updateProjectSelect').value = projectId;
            loadProjectForUpdate();
        }

        function deleteProject(projectId) {
            if (confirm('Are you sure you want to delete this project? This action cannot be undone.')) {
                projectData = projectData.filter(p => p.id !== projectId);
                saveData(projectData);
                showAlert('🗑️ Project deleted successfully!', 'success');
                loadManageTable();
            }
        }

        // Export Data
        function exportData() {
            const dataStr = JSON.stringify(projectData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `DoST_Projects_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            
            showAlert('💾 Data exported successfully!', 'success');
        }

        // Import Data
        function importData() {
            document.getElementById('importFileInput').click();
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm(`Import ${imported.length} projects? This will replace all existing data.`)) {
                            projectData = imported;
                            saveData(projectData);
                            showAlert('📤 Data imported successfully!', 'success');
                            loadManageTable();
                        }
                    } else {
                        showAlert('❌ Invalid file format. Please upload a valid JSON file.', 'error');
                    }
                } catch (error) {
                    showAlert('❌ Error reading file. Please check the file format.', 'error');
                }
            };
            reader.readAsText(file);
            
            // Reset input
            event.target.value = '';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadManageTable();
        });
    </script>
</body>
</html>
